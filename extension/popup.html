<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ManifestGuard Scanner</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Header -->
  <header class="mg-header">
    <div class="mg-logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z" fill="#2dd4bf" opacity="0.2"/>
        <path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z" stroke="#2dd4bf" stroke-width="1.5" fill="none"/>
        <path d="M9 12l2 2 4-4" stroke="#2dd4bf" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>ManifestGuard</span>
    </div>
    <span class="mg-version">v3.0</span>
  </header>

  <!-- Settings -->
  <div class="mg-settings">
    <label for="apiUrl">API Server</label>
    <div class="mg-input-group">
      <input type="url" id="apiUrl" placeholder="http://localhost:8000" spellcheck="false">
      <button id="saveUrl" title="Save URL">✓</button>
    </div>
  </div>

  <!-- Scan Options -->
  <div class="mg-options">
    <label class="mg-checkbox">
      <input type="checkbox" id="enableDeepScan" checked>
      <span>Deep scan (source code analysis)</span>
    </label>
    <label class="mg-checkbox">
      <input type="checkbox" id="enableAi">
      <span>AI explanations (requires Groq key)</span>
    </label>
  </div>

  <!-- Scan Button -->
  <button id="scanBtn" class="mg-scan-btn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    Scan My Extensions
  </button>

  <!-- Status Area -->
  <div id="statusArea" class="mg-status hidden">
    <div class="mg-spinner"></div>
    <p id="statusText">Scanning...</p>
  </div>

  <!-- Results Area -->
  <div id="resultsArea" class="mg-results hidden">
    <div class="mg-result-header">
      <h3>Scan Complete</h3>
      <span id="totalCount" class="mg-badge">0 extensions</span>
    </div>
    <div class="mg-verdict-grid">
      <div class="mg-verdict-card trusted">
        <span class="mg-verdict-count" id="trustedCount">0</span>
        <span class="mg-verdict-label">Trusted</span>
      </div>
      <div class="mg-verdict-card low">
        <span class="mg-verdict-count" id="lowCount">0</span>
        <span class="mg-verdict-label">Low Risk</span>
      </div>
      <div class="mg-verdict-card moderate">
        <span class="mg-verdict-count" id="moderateCount">0</span>
        <span class="mg-verdict-label">Moderate</span>
      </div>
      <div class="mg-verdict-card suspicious">
        <span class="mg-verdict-count" id="suspiciousCount">0</span>
        <span class="mg-verdict-label">Suspicious</span>
      </div>
      <div class="mg-verdict-card malicious">
        <span class="mg-verdict-count" id="maliciousCount">0</span>
        <span class="mg-verdict-label">Malicious</span>
      </div>
    </div>
    <button id="viewReport" class="mg-report-btn">View Full Report →</button>
  </div>

  <!-- Error Area -->
  <div id="errorArea" class="mg-error hidden">
    <p id="errorText"></p>
    <button id="retryBtn" class="mg-retry-btn">Try Again</button>
  </div>

  <!-- Footer -->
  <footer class="mg-footer">
    <span>Extensions are analyzed for security risks</span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
